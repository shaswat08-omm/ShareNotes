<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library - Share Notes</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome Hooks -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Header / Navigation -->
    <header>
        <nav>
            <a href="index.html" class="logo">Share Notes</a>
            <div class="hamburger">
                <i class="fas fa-bars"></i>
            </div>
            <div class="nav-menu">
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="library.html" style="color: var(--primary-color); font-weight: 700;">My Library</a>
                    <a href="uploads.html">My Uploads</a>
                    <a href="upload.html">Upload Materials</a>
                </div>
                <div class="nav-auth">
                    <a href="login.html" class="btn btn-primary" id="authBtn">Login</a>
                </div>
            </div>
        </nav>
    </header>

    <!-- Page Header -->
    <div class="page-header">
        <div class="container">
            <h1>My Personal Library</h1>
            <p>Access all your saved study notes and materials in one place.</p>
        </div>
    </div>

    <!-- Library Notes Section -->
    <section class="shared-notes" style="background-color: var(--white); min-height: 50vh;">
        <div class="container">
            <div class="notes-grid" id="libraryNotesContainer">
                <!-- Saved notes will be injected here by app.js -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2026 Share Notes. All rights reserved.</p>
        </div>
    </footer>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- App JS -->
    <script src="app.js"></script>
</body>
</html>
